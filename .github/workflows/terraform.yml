name: Terraform

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.tfvars"
      - "tfvars/**/*.tfvars"
  push:
    branches:
      - main
    paths:
      - "**.tf"
      - "**.tfvars"
      - "tfvars/**/*.tfvars"

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Select tfvars files
        id: tfvars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          files=$(git diff --name-only "$base" "$GITHUB_SHA" -- 'tfvars/**/*.tfvars' '*.auto.tfvars' | tr '\n' ' ')
          if [ -z "$files" ]; then
            files="catalog.auto.tfvars"
          fi

          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Terraform plan
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          for file in ${{ steps.tfvars.outputs.files }}; do
            terraform plan -var-file="$file"
          done
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Terraform apply
        if: github.event_name == 'push'
        shell: bash
        run: |
          for file in ${{ steps.tfvars.outputs.files }}; do
            terraform apply -auto-approve -var-file="$file"
          done
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
